<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>回魂煞 - 离线</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050202; color: #8a7a5a;
            font-family: "Courier New", "SimSun", monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }
        .offline-box {
            text-align: center; padding: 40px;
            border: 1px solid #3a1515; background: rgba(15,8,5,0.9);
            max-width: 400px; width: 90vw;
        }
        .offline-icon { font-size: 48px; margin-bottom: 20px; }
        .offline-title { font-size: 20px; color: #c9a86c; margin-bottom: 16px; letter-spacing: 4px; }
        .offline-text { font-size: 14px; line-height: 1.8; margin-bottom: 24px; }
        .offline-hint { font-size: 12px; color: #5a3a1a; margin-bottom: 20px; }
        .retry-btn {
            padding: 12px 32px; border: 1px solid #3a1515;
            background: rgba(30,15,10,0.9); color: #c9a86c;
            font-size: 14px; font-family: inherit; cursor: pointer;
            letter-spacing: 2px;
        }
        .retry-btn:hover { border-color: #8a0000; }
        .crt::before {
            content: " "; position: fixed; top:0; left:0; width:100%; height:100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
            pointer-events: none; z-index: 9999;
        }
    </style>
</head>
<body class="crt">
    <div class="offline-box">
        <div class="offline-icon">📡</div>
        <div class="offline-title">信号丢失</div>
        <div class="offline-text">
            你与老宅的连接中断了。<br>
            没有网络，纸人找不到你。<br>
            但也意味着...它暂时也找不到你。
        </div>
        <div class="offline-hint">
            请检查网络连接后重试。<br>
            部分本地存档仍可读取。
        </div>
        <button class="retry-btn" onclick="location.reload()">重新连接</button>
    </div>
    <script>
        // Auto-retry every 10s
        setInterval(() => {
            if (navigator.onLine) location.reload();
        }, 10000);
    </script>
</body>
</html>
